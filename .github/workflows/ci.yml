name: CI

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

on:
  pull_request:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]
  push:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "poetry"

      - name: Cache packages
        id: cache-packages
        uses: actions/cache@v5
        with:
          path: ~/packages
          key: ${{ runner.os }}-packages

      - name: Install packages
        env:
          CACHE_HIT: ${{ steps.cache-packages.outputs.cache-hit }}
        run: |
          if [[ "$CACHE_HIT" == "true" ]]; then
            sudo cp --verbose --force --recursive ~/packages/* /
          else
            sudo apt-get update
            sudo apt-get install --yes libimage-exiftool-perl libmagickwand-dev
            mkdir -p ~/packages/
            sudo dpkg -L libimage-exiftool-perl libmagickwand-dev \
              | while IFS= read -r f; do
                  if test -f "$f"; then echo "$f"; fi
                done \
              | xargs -r cp --parents --target-directory ~/packages/
          fi

      - name: Install Poetry
        run: pipx install poetry

      - run: poetry install

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Install Docker Compose
        run: sudo apt-get update && sudo apt-get install -y docker-compose

      - name: Build the Stack
        run: docker-compose -f local.yml build

      - name: Run Django Tests
        run: docker-compose -f local.yml run django pytest

      - name: Tear down the Stack
        run: docker-compose -f local.yml down
